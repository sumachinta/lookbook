<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wardrobe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #faf9f7;
  --bg2: #f2f0ec;
  --bg3: #e8e5df;
  --text: #191816;
  --text2: #7a756d;
  --text3: #b5b0a8;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.14);
  --radius: 6px;
  --radius-lg: 10px;
  --accent: #5060f0;
  --accent-bg: #eef0ff;
  --nav-h: 48px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110;
    --bg2: #1b1a18;
    --bg3: #252420;
    --text: #eeebe5;
    --text2: #908b82;
    --text3: #4e4a44;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent-bg: #171a30;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg3);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
#root { max-width: 1080px; margin: 0 auto; }

/* ── Base elements ── */
input, select, textarea {
  font-family: inherit; font-size: 13px; color: var(--text);
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 8px 11px; width: 100%;
  outline: none; transition: border-color 0.15s;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--text3); }
button {
  font-family: inherit; cursor: pointer;
  border: 1px solid var(--border2); border-radius: var(--radius);
  background: transparent; color: var(--text);
  padding: 7px 14px; font-size: 13px; font-weight: 400;
  transition: background 0.12s, opacity 0.12s;
  letter-spacing: 0.01em;
}
button:hover { background: var(--bg2); }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
.btn-primary:hover { opacity: 0.86; background: var(--text); }
.btn-ai { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); font-weight: 500; }
.btn-ai:hover { opacity: 0.85; background: var(--accent-bg); }
.btn-danger { color: #c03030; border-color: #c03030; }
.btn-danger:hover { background: #fff0f0; }
.tag {
  display: inline-block; font-size: 11px; padding: 3px 9px;
  border-radius: 20px; background: var(--bg2); color: var(--text2);
  border: 1px solid var(--border); margin: 2px;
  font-weight: 400; letter-spacing: 0.02em;
}
.pill { font-size: 11px; padding: 2px 9px; border-radius: 20px; display: inline-block; font-weight: 500; }
.cat-Top       { background:#deeef9; color:#0c4880; }
.cat-Bottom    { background:#dff0d5; color:#235a08; }
.cat-Shoes     { background:#fae9cc; color:#6b3d08; }
.cat-Outerwear { background:#ece9fd; color:#3c318a; }
.cat-Accessory { background:#fae3ee; color:#7a2040; }
.cat-Dress     { background:#d8f4ec; color:#07523c; }
.cat-Other     { background:#eeebe4; color:#444440; }

/* ── Overlay & modals ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 300; backdrop-filter: blur(6px);
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes slideUp { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
.modal {
  background: var(--bg); border-radius: var(--radius-lg);
  border: 1px solid var(--border2); padding: 1.5rem;
  width: 420px; max-height: 92vh; overflow-y: auto;
  box-shadow: 0 30px 90px rgba(0,0,0,0.3);
  animation: slideUp 0.2s ease;
}

/* ── Item detail modal ── */
.detail-modal {
  background: var(--bg);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border2);
  width: min(860px, 95vw);
  max-height: 90vh;
  display: flex;
  overflow: hidden;
  box-shadow: 0 35px 100px rgba(0,0,0,0.35);
  animation: slideUp 0.2s ease;
}
.detail-img-pane {
  flex: 0 0 56%;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative; min-height: 440px;
}
.detail-img-pane img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.detail-img-pane .no-photo {
  font-size: 80px; opacity: 0.35;
}
.detail-info-pane {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
}
.detail-scroll {
  flex: 1; overflow-y: auto; padding: 2rem 1.75rem 1rem;
}
.detail-scroll h2 {
  font-size: 19px; font-weight: 600; line-height: 1.3;
  margin-bottom: 12px; letter-spacing: -0.01em;
}
.detail-meta-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.detail-brand {
  font-size: 13px; color: var(--text2); margin-top: 4px; margin-bottom: 14px;
}
.detail-tags { margin-top: 14px; }
.detail-tags-label {
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
}
.detail-actions {
  padding: 1rem 1.75rem 1.75rem;
  display: flex; gap: 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-close {
  position: absolute; top: 12px; right: 12px;
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; padding: 0; border: 1px solid var(--border2);
  background: var(--bg); z-index: 1; flex-shrink: 0;
}
@media (max-width: 640px) {
  .detail-modal { flex-direction: column; max-height: 96vh; }
  .detail-img-pane { flex: 0 0 52vw; min-height: 0; }
}

/* ── Top nav ── */
.top-nav {
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.nav-tabs { display: flex; gap: 0; }
.nav-tab {
  padding: 0 16px; height: var(--nav-h);
  font-size: 13px; font-weight: 400;
  border: none; border-bottom: 2px solid transparent; border-radius: 0;
  background: transparent; color: var(--text2);
  letter-spacing: 0.03em; text-transform: uppercase;
  transition: color 0.13s;
  display: flex; align-items: center; gap: 6px;
}
.nav-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }
.nav-tab:hover { background: transparent; color: var(--text); }
.settings-btn {
  padding: 5px 10px; font-size: 12px;
  border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text2); display: flex; align-items: center; gap: 5px;
}
.settings-badge { font-size: 9px; font-weight: 700; }

/* ── Toolbar (filters + add) ── */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 1.25rem;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.toolbar::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
  font-size: 12px; border: 1px solid var(--border2);
  background: transparent; color: var(--text2);
  white-space: nowrap; transition: all 0.12s;
  letter-spacing: 0.02em;
}
.cat-chip:hover { color: var(--text); background: var(--bg2); }
.cat-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }
.cat-chip.active:hover { background: var(--text); }
.toolbar-divider {
  width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; margin: 0 2px;
}
.search-input {
  flex: 1 1 130px; min-width: 100px; max-width: 200px;
  background: var(--bg2) !important; border-color: transparent !important;
  font-size: 12px !important;
}
.search-input:focus { border-color: var(--border2) !important; background: var(--bg) !important; }
.add-btn {
  flex-shrink: 0; padding: 5px 14px;
  font-size: 12px; font-weight: 600;
  background: var(--text); color: var(--bg); border-color: var(--text);
  border-radius: var(--radius);
}
.add-btn:hover { opacity: 0.85; background: var(--text); }
.add-multi-btn {
  flex-shrink: 0; padding: 5px 13px;
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text2);
}
.add-multi-btn:hover { background: var(--bg2); color: var(--text); }

/* Bulk upload modal */
.bulk-drop-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 2rem 1rem; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--text3); font-size: 13px; line-height: 2;
}
.bulk-drop-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.bulk-preview-grid {
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px;
  max-height: 280px; overflow-y: auto; margin-top: 12px;
}
.bulk-thumb {
  aspect-ratio: 3/4; border-radius: var(--radius); overflow: hidden;
  background: var(--bg2); position: relative; border: 1px solid var(--border);
}
.bulk-thumb img { width:100%; height:100%; object-fit:cover; }
.bulk-thumb-status {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 600;
  background: rgba(0,0,0,0.5); color: #fff; text-align: center; padding: 4px;
}

/* ── Photo grid ── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 3px;
  padding: 3px;
}
@media (max-width: 860px) {
  .photo-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 560px) {
  .photo-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

/* ── Grid card (photo-only) ── */
.grid-card {
  cursor: pointer;
  aspect-ratio: 3/4;
  overflow: hidden;
  position: relative;
  background: var(--bg2);
  transition: opacity 0.15s;
}
.grid-card:hover { opacity: 0.88; }
.grid-card img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; transition: transform 0.3s ease;
}
.grid-card:hover img { transform: scale(1.04); }
.grid-card-emoji {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; opacity: 0.35;
}
/* Tiny category indicator — bottom-left corner */
.grid-cat-dot {
  position: absolute; bottom: 6px; left: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.8);
  pointer-events: none;
}
.dot-Top       { background: #4a9fdc; }
.dot-Bottom    { background: #52a836; }
.dot-Shoes     { background: #d07a28; }
.dot-Outerwear { background: #7869cc; }
.dot-Accessory { background: #c44e7a; }
.dot-Dress     { background: #28a885; }
.dot-Other     { background: #999; }

/* Selected state for builder */
.grid-card.selected::after {
  content: '✓';
  position: absolute; top: 7px; right: 7px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  border: 1.5px solid rgba(255,255,255,0.5);
}
.grid-card.selected { outline: 2px solid var(--text); outline-offset: -2px; }

/* ── Misc layout ── */
.grid-2 { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.07em; }
.section-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 10px; }
.empty-state { text-align: center; padding: 4rem 1rem; color: var(--text3); font-size: 13px; line-height: 2.2; }
.ai-banner { background: var(--accent-bg); border: 1px solid rgba(80,96,240,0.2); border-radius: var(--radius); padding: 10px 12px; font-size: 12px; color: var(--accent); margin-bottom: 12px; line-height: 1.6; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Builder layout — carousel */
.builder-carousel {
  padding: 1.25rem;
  max-width: 860px;
  margin: 0 auto;
  overflow-y: auto;
  background: var(--bg3);
  min-height: calc(100vh - var(--nav-h) - 1px);
}
.carousel-section { margin-bottom: 20px; }
.carousel-row-label {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.09em;
  margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.carousel-row-label span { font-weight: 400; opacity: 0.7; }
.carousel-strip {
  display: flex; gap: 6px;
  overflow-x: auto; padding: 4px 0 10px;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}
.carousel-strip::-webkit-scrollbar { height: 3px; }
.carousel-strip::-webkit-scrollbar-track { background: transparent; }
.carousel-strip::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
.carousel-card {
  flex-shrink: 0; width: 84px; height: 110px;
  cursor: pointer; position: relative; overflow: hidden;
  background: var(--bg2); border-radius: var(--radius);
  border: 2px solid transparent;
  transition: border-color 0.12s, transform 0.12s;
}
.carousel-card:hover { transform: translateY(-2px); }
.carousel-card.selected {
  border-color: var(--text);
}
.carousel-card.selected::after {
  content: '✓';
  position: absolute; top: 5px; right: 5px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
}
.carousel-card img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.carousel-card-emoji {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; opacity: 0.35;
}
.builder-form {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.25rem;
  margin-top: 8px;
}
.builder-selected-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
}
.builder-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px 5px 5px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11px;
}
.builder-chip-thumb {
  width: 24px; height: 30px; border-radius: 3px; overflow: hidden;
  background: var(--bg3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.builder-chip-thumb img { width: 100%; height: 100%; object-fit: cover; }

/* Legacy builder classes kept for EditOutfitModal */
.builder-toolbar {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}

/* Outfit cards */
.outfit-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1rem;
  transition: border-color 0.15s;
}
.outfit-card:hover { border-color: var(--border2); }

/* Card (for old selectable use) */
.card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s; }
.card:hover { border-color: var(--border2); }
.card.selected { border: 2px solid var(--text); }
.img-box { width: 100%; aspect-ratio: 3/4; background: var(--bg2); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 36px; }
.img-box img { width: 100%; height: 100%; object-fit: cover; }

/* Content area */
.content { padding: 0; background: var(--bg3); min-height: calc(100vh - var(--nav-h) - 1px); }
.outfits-content { padding: 1.25rem; }
</style>
</head>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

function loadState(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}

async function hashPassword(password) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function uploadToCloudinary(file, cloudName, uploadPreset) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', uploadPreset);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method:'POST', body:formData });
  if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.error?.message || `Cloudinary error (${res.status})`); }
  return (await res.json()).secure_url;
}

async function analyzeClothingImage(photoUrl, apiKey) {
  const imageSource = photoUrl.startsWith('http')
    ? { type:'url', url:photoUrl }
    : { type:'base64', media_type:photoUrl.split(';')[0].split(':')[1]||'image/jpeg', data:photoUrl.split(',')[1] };
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-opus-4-6', max_tokens:300, messages:[{ role:'user', content:[
      { type:'image', source:imageSource },
      { type:'text', text:`Analyze this clothing item. Reply ONLY with a valid JSON object, no markdown:\n{"name":"short descriptive name","category":"one of: Top Bottom Shoes Outerwear Accessory Dress Other","color":"pick the single closest color from this list: ${COLOR_DICT.join(', ')}","tags":["2 to 4 tags from: casual formal smart-casual summer winter autumn spring minimal feminine streetwear athletic bohemian vintage crop oversized fitted knit denim leather floral printed versatile"]}` }
    ]}]})
  });
  if(!res.ok){ const e=await res.json().catch(()=>{}); throw new Error(e?.error?.message||`API error ${res.status}`); }
  const data = await res.json();
  return JSON.parse((data.content?.find(b=>b.type==='text')?.text||'').replace(/```json|```/g,'').trim());
}

async function suggestOutfitOccasions(selectedItems, apiKey, tagGroups) {
  const contentBlocks = [];
  for (const item of selectedItems) {
    if (item.photo) {
      const imageSource = item.photo.startsWith('http')
        ? { type:'url', url:item.photo }
        : { type:'base64', media_type:item.photo.split(';')[0].split(':')[1]||'image/jpeg', data:item.photo.split(',')[1] };
      contentBlocks.push({ type:'image', source:imageSource });
    }
  }
  const itemSummary = selectedItems.map(i=>`${i.name} (${i.category}, ${i.color}${i.tags.length?', '+i.tags.join('/'):''})`).join('; ');
  const groups = tagGroups || DEFAULT_TAG_GROUPS;
  const groupsDesc = groups.map(g => `${g.name}: ${g.tags.join(', ')}`).join('\n');
  const exampleTag = groups[0]?.tags[0] || '💼 Work';
  contentBlocks.push({ type:'text', text:`Outfit items: ${itemSummary}\nChoose 1-3 tags from the groups below. Reply ONLY with a JSON array.\n${groupsDesc}\nExample: ["${exampleTag}"]` });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-opus-4-6', max_tokens:150, messages:[{ role:'user', content:contentBlocks }]})
  });
  if(!res.ok){ const e=await res.json().catch(()=>{}); throw new Error(e?.error?.message||`API error ${res.status}`); }
  const data = await res.json();
  const parsed = JSON.parse((data.content?.find(b=>b.type==='text')?.text||'[]').replace(/```json|```/g,'').trim());
  return parsed.filter(o=>OUTFIT_OCCASIONS.includes(o));
}

/* ── Login Screen ── */
function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState('login');
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [confirm, setConfirm] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setError(''); setLoading(true);
    try {
      const uname = username.trim().toLowerCase();
      if (!uname) { setError('Username is required.'); setLoading(false); return; }
      if (!password) { setError('Password is required.'); setLoading(false); return; }
      const users = loadState(STORAGE_KEY_USERS, []);
      if (mode === 'login') {
        const user = users.find(u => u.username === uname);
        if (!user) { setError('Username not found.'); setLoading(false); return; }
        const hash = await hashPassword(password);
        if (hash !== user.passwordHash) { setError('Incorrect password.'); setLoading(false); return; }
        sessionStorage.setItem(SK_CURRENT_USER, uname);
        onLogin(uname);
      } else {
        if (password.length < 6) { setError('Password must be at least 6 characters.'); setLoading(false); return; }
        if (password !== confirm) { setError('Passwords do not match.'); setLoading(false); return; }
        if (users.find(u => u.username === uname)) { setError('Username already taken.'); setLoading(false); return; }
        const passwordHash = await hashPassword(password);
        localStorage.setItem(STORAGE_KEY_USERS, JSON.stringify([...users, { username: uname, passwordHash, createdAt: Date.now() }]));
        localStorage.setItem(storageKey('items', uname), JSON.stringify(SAMPLE_ITEMS));
        localStorage.setItem(storageKey('outfits', uname), JSON.stringify(SAMPLE_OUTFITS));
        sessionStorage.setItem(SK_CURRENT_USER, uname);
        onLogin(uname);
      }
    } catch(e) { setError('Something went wrong. Please try again.'); }
    setLoading(false);
  };

  const onKey = e => { if (e.key === 'Enter') submit(); };

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', background:'var(--bg3)', fontFamily:"'Jost', sans-serif" }}>
      <div style={{ background:'var(--bg)', border:'1px solid var(--border2)', borderRadius:'var(--radius-lg)', padding:'2.5rem 2rem', width:340, boxShadow:'0 30px 90px rgba(0,0,0,0.15)', animation:'slideUp 0.2s ease' }}>
        <p style={{ fontSize:20, fontWeight:600, marginBottom:2, letterSpacing:'-0.02em' }}>Lookbook</p>
        <p style={{ fontSize:12, color:'var(--text3)', marginBottom:'1.75rem' }}>Your personal wardrobe guide</p>
        <div style={{ display:'flex', marginBottom:'1.5rem', borderBottom:'1px solid var(--border)' }}>
          {[['login','Sign in'],['register','Create account']].map(([m,label]) => (
            <button key={m} onClick={()=>{ setMode(m); setError(''); }} style={{
              flex:1, border:'none', borderRadius:0, background:'transparent',
              color: mode===m ? 'var(--text)' : 'var(--text3)',
              fontWeight: mode===m ? 600 : 400,
              borderBottom: mode===m ? '2px solid var(--text)' : '2px solid transparent',
              padding:'8px 0', fontSize:13, letterSpacing:'0.02em', marginBottom:-1
            }}>{label}</button>
          ))}
        </div>
        <div className="form-row">
          <label>Username</label>
          <input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={onKey} placeholder="your username" autoFocus />
        </div>
        <div className="form-row">
          <label>Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={onKey} placeholder="••••••" />
        </div>
        {mode === 'register' && (
          <div className="form-row">
            <label>Confirm password</label>
            <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={onKey} placeholder="••••••" />
          </div>
        )}
        {error && <p style={{ fontSize:12, color:'#c00', marginBottom:10, lineHeight:1.5 }}>{error}</p>}
        <button className="btn-primary" style={{ width:'100%', padding:'10px', marginTop:4 }} onClick={submit} disabled={loading||!username.trim()||!password}>
          {loading ? <><span className="spinner" style={{ borderColor:'var(--bg)', borderTopColor:'transparent' }}/>…</> : mode==='login' ? 'Sign in' : 'Create account'}
        </button>
        {mode === 'register' && (
          <p style={{ fontSize:11, color:'var(--text3)', marginTop:12, lineHeight:1.6, textAlign:'center' }}>
            A sample wardrobe will be added to help you get started.
          </p>
        )}
      </div>
    </div>
  );
}

function SettingsModal({ onClose, currentUser, tagGroups, setTagGroups }) {
  const [key, setKey] = useState(() => localStorage.getItem(storageKey('apikey', currentUser))||'');

  const [uploadPreset, setUploadPreset] = useState(()=>loadCloud().uploadPreset||'');
  const [cloudSaved, setCloudSaved] = useState(false);
  const [groups, setGroups] = useState(tagGroups||DEFAULT_TAG_GROUPS);
  const [newGroupName, setNewGroupName] = useState('');
  const [addTagInputs, setAddTagInputs] = useState({});

  const updateGroups = updated => { setGroups(updated); setTagGroups(updated); };
  const renameGroup = (gi, name) => updateGroups(groups.map((g,i)=>i===gi?{...g,name}:g));
  const deleteGroup = gi => updateGroups(groups.filter((_,i)=>i!==gi));
  const addTag = gi => {
    const val = (addTagInputs[gi]||'').trim(); if(!val) return;
    updateGroups(groups.map((g,i)=>i===gi?{...g,tags:[...g.tags,val]}:g));
    setAddTagInputs(p=>({...p,[gi]:''}));
  };
  const deleteTag = (gi,ti) => updateGroups(groups.map((g,i)=>i===gi?{...g,tags:g.tags.filter((_,j)=>j!==ti)}:g));
  const addGroup = () => {
    const name = newGroupName.trim(); if(!name) return;
    updateGroups([...groups,{id:Date.now(),name,tags:[]}]);
    setNewGroupName('');
  };

  const saveApiKey = () => { localStorage.setItem(storageKey('apikey', currentUser), key.trim()); setSaved(true); setTimeout(()=>setSaved(false),1500); };
  const saveCloudinary = () => {
    localStorage.setItem(storageKey('cloudinary', currentUser), JSON.stringify({ cloudName:cloudName.trim(), uploadPreset:uploadPreset.trim() }));

          <div className="form-row"><label>Cloud name</label><input value={cloudName} onChange={e=>setCloudName(e.target.value)} placeholder="e.g. my-wardrobe-app" /></div>
          <div className="form-row"><label>Upload preset (unsigned)</label><input value={uploadPreset} onChange={e=>setUploadPreset(e.target.value)} placeholder="e.g. outfit_unsigned" /></div>
          <div style={{ display:'flex', gap:8 }}>
            <button className="btn-primary" style={{ flex:1 }} onClick={saveCloudinary} disabled={!cloudName.trim()||!uploadPreset.trim()}>{cloudSaved?'✓ Saved!':'Save Cloudinary'}</button>
            {(cloudName||uploadPreset) && <button className="btn-danger" onClick={()=>{ localStorage.removeItem(storageKey('cloudinary', currentUser)); setCloudName(''); setUploadPreset(''); }}>Remove</button>}

        </div>
        <hr style={{ border:'none', borderTop:'1px solid var(--border)', margin:'0 0 18px' }} />
        <div>
          <p style={{ fontWeight:600, fontSize:12, marginBottom:7, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text2)' }}>AI Auto-fill — Anthropic</p>
          <div className="ai-banner" style={{ fontSize:11 }}>Upload a photo → Claude suggests name, category, color &amp; tags.</div>
          <div className="form-row"><label>Anthropic API key</label>

/* ── Item Add/Edit Modal ── */
function ItemModal({ item, onSave, onClose, currentUser }) {
  const init = item || { name:'', category:'Top', color:'', brand:'', cost:'', tags:'', photo:'', purchaseLink:'' };
  const [form, setForm] = useState({ ...init, tags:Array.isArray(init.tags)?init.tags.join(', '):init.tags, cost:init.cost||'' });
  const [uploading, setUploading] = useState(false);
  const [uploadPct, setUploadPct] = useState(0);
  const [uploadErr, setUploadErr] = useState('');
  const [analyzing, setAnalyzing] = useState(false);
  const [aiError, setAiError] = useState('');
  const [aiDone, setAiDone] = useState(false);
  const fileRef = useRef();
  const apiKey = localStorage.getItem(storageKey('apikey', currentUser))||'';
  const cloudConfig = (() => { try { return JSON.parse(localStorage.getItem(storageKey('cloudinary', currentUser))||'{}'); } catch { return {}; } })();
  const cloudinaryReady = !!(cloudConfig.cloudName && cloudConfig.uploadPreset);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const autoFill = async (overridePhoto) => {
    const photo = overridePhoto || form.photo;
    if(!photo||!apiKey) return;
    setAnalyzing(true); setAiError(''); setAiDone(false);
    try {
      const r = await analyzeClothingImage(photo, apiKey);
      setForm(f=>({ ...f, name:r.name||f.name, category:CATEGORIES.includes(r.category)?r.category:f.category, color:r.color||f.color, tags:Array.isArray(r.tags)?r.tags.join(', '):f.tags }));
      setAiDone(true);
    } catch(err) { setAiError('AI analysis failed. Check your API key in Settings.'); }
    setAnalyzing(false);
  };

  const handleFile = async e => {
    const file = e.target.files[0]; if(!file) return;
    setUploadErr(''); setAiDone(false);
    const localPreview = await new Promise(res => { const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.readAsDataURL(file); });
    set('photo', localPreview);
    if(!cloudinaryReady) { setUploadErr('⚠ Cloudinary not set up. Photo saved locally only.'); if(apiKey) autoFill(localPreview); return; }
    setUploading(true); setUploadPct(20);
    try {
      setUploadPct(50);
      const url = await uploadToCloudinary(file, cloudConfig.cloudName, cloudConfig.uploadPreset);
      setUploadPct(100); set('photo', url);
      if(apiKey) autoFill(url);
    } catch(err) { setUploadErr(err.message||'Upload failed.'); }
    setUploading(false); setUploadPct(0);
  };

  const submit = () => {
    if(!form.name.trim()) return;
    onSave({ ...form, cost:form.cost?Number(form.cost):null, tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean), id:item?item.id:Date.now() });
    onClose();
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem' }}>

/* ── Bulk Upload Modal ── */
function BulkUploadModal({ onClose, onSave, currentUser }) {
  const [files, setFiles] = useState([]); // [{file, preview, status, name}]
  const [uploading, setUploading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef();
  const apiKey = localStorage.getItem(storageKey('apikey', currentUser))||'';
  const cloudConfig = (() => { try { return JSON.parse(localStorage.getItem(storageKey('cloudinary', currentUser))||'{}'); } catch { return {}; } })();
  const cloudinaryReady = !!(cloudConfig.cloudName && cloudConfig.uploadPreset);

  const addFiles = async (fileList) => {
    const images = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    const newEntries = await Promise.all(images.map(async f => {
      const preview = await new Promise(res => { const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.readAsDataURL(f); });
      return { file: f, preview, status: 'pending', name: '' };
    }));
    setFiles(p => [...p, ...newEntries]);
  };

  const onDrop = e => { e.preventDefault(); setDragOver(false); addFiles(e.dataTransfer.files); };
  const onDragOver = e => { e.preventDefault(); setDragOver(true); };
  const onDragLeave = () => setDragOver(false);

  const uploadAll = async () => {
    if (!files.length) return;
    setUploading(true);
    const results = [];
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      if (f.status === 'done') { results.push(null); continue; }
      setFiles(p => p.map((x,j) => j===i ? { ...x, status:'uploading' } : x));
      try {
        let photoUrl = f.preview;
        if (cloudinaryReady) {
          photoUrl = await uploadToCloudinary(f.file, cloudConfig.cloudName, cloudConfig.uploadPreset);
        }
        let meta = { name: f.file.name.replace(/\.[^.]+$/,''), category:'Other', color:'', tags:[] };
        if (apiKey) {
          try { meta = await analyzeClothingImage(photoUrl, apiKey); } catch {}
        }
        const item = { id: Date.now() + i, name: meta.name||f.file.name, category: CATEGORIES.includes(meta.category)?meta.category:'Other', color: meta.color||'', tags: Array.isArray(meta.tags)?meta.tags:[], brand:'', cost:null, photo:photoUrl, purchaseLink:'', wornCount:0, lastWorn:null };
        results.push(item);
        setFiles(p => p.map((x,j) => j===i ? { ...x, status:'done', name:item.name } : x));
      } catch(err) {
        results.push(null);
        setFiles(p => p.map((x,j) => j===i ? { ...x, status:'error' } : x));
      }
    }
    const saved = results.filter(Boolean);
    if (saved.length) onSave(saved);
    setUploading(false);
    if (saved.length === files.length || files.every(f=>f.status==='done'||f.status==='error')) {
      setTimeout(onClose, 800);
    }
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{ width:480 }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem' }}>
          <p style={{ fontWeight:600, fontSize:15, letterSpacing:'-0.01em' }}>Add multiple items</p>
          <button style={{ border:'none', padding:'4px 8px', fontSize:16 }} onClick={onClose}>✕</button>
        </div>

        {!cloudinaryReady && (
          <div className="ai-banner" style={{ marginBottom:12 }}>⚠ Cloudinary not set up — photos will be saved locally only.</div>
        )}
        {!apiKey && (
          <div style={{ fontSize:11, color:'var(--text3)', marginBottom:10, lineHeight:1.6 }}>No API key set — items will be saved without AI analysis. Add your key in Settings.</div>
        )}

        <input ref={fileRef} type="file" accept="image/*" multiple style={{ display:'none' }} onChange={e=>addFiles(e.target.files)} />

        <div
          className={`bulk-drop-zone${dragOver?' drag-over':''}`}
          onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
          onClick={()=>!uploading&&fileRef.current.click()}
        >
          <div style={{ fontSize:28, marginBottom:4 }}>📁</div>
          Drop photos here or click to select
          <br/>
          <span style={{ fontSize:11 }}>Select multiple images at once</span>
        </div>

        {files.length > 0 && (
          <>
            <div className="bulk-preview-grid">
              {files.map((f,i) => (
                <div key={i} className="bulk-thumb">
                  <img src={f.preview} alt="" />
                  {f.status === 'uploading' && <div className="bulk-thumb-status"><span className="spinner" style={{ borderColor:'#fff', borderTopColor:'transparent' }}/></div>}
                  {f.status === 'done'      && <div className="bulk-thumb-status" style={{ background:'rgba(30,160,60,0.7)' }}>✓</div>}
                  {f.status === 'error'     && <div className="bulk-thumb-status" style={{ background:'rgba(180,30,30,0.75)' }}>✕</div>}
                </div>
              ))}
            </div>
            <p style={{ fontSize:11, color:'var(--text3)', marginTop:8, textAlign:'center' }}>
              {files.filter(f=>f.status==='done').length} / {files.length} done
              {files.some(f=>f.status==='error') ? ` · ${files.filter(f=>f.status==='error').length} failed` : ''}
            </p>
          </>
        )}

        <div style={{ display:'flex', gap:8, marginTop:'1.25rem' }}>
          <button className="btn-primary" style={{ flex:1, padding:'10px' }} onClick={uploadAll} disabled={!files.length||uploading}>
            {uploading ? <><span className="spinner" style={{ borderColor:'var(--bg)', borderTopColor:'transparent' }}/>Uploading…</> : `Upload ${files.length} photo${files.length!==1?'s':''}`}
          </button>
          <button style={{ flex:1 }} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ── Wardrobe Tab ── */
function WardrobeTab({ items, setItems, currentUser }) {
  const [modal, setModal] = useState(null);
  const [detail, setDetail] = useState(null);
  const [filterCat, setFilterCat] = useState('All');
  const [search, setSearch] = useState('');
  const [showBulk, setShowBulk] = useState(false);

  // All items that pass the active filter / search
  const filtered = useMemo(() => items.filter(i => {
    if(filterCat !== 'All' && i.category !== filterCat) return false;
    if(search && ![i.name, i.brand||'', i.color||'', ...(i.tags||[])].join(' ').toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }), [items, filterCat, search]);

  // Group by category (only when showing All and not searching)
  // Each entry: { category, items[] }
  const grouped = useMemo(() => {
    const showSections = filterCat === 'All' && !search;
    if (!showSections) return null; // null = flat grid
    return CATEGORIES
      .map(cat => ({ cat, items: filtered.filter(i => i.category === cat).sort((a,b)=>colorRank(a.color)-colorRank(b.color)) }))
      .filter(g => g.items.length > 0);
  }, [filtered, filterCat, search]);

  const saveItem = item => setItems(p => p.some(i=>i.id===item.id) ? p.map(i=>i.id===item.id?item:i) : [...p, item]);
  const handleEdit = item => { setDetail(null); setTimeout(()=>setModal(item), 80); };
  const handleDelete = id => { setItems(p=>p.filter(i=>i.id!==id)); setDetail(null); };

  return (
    <div className="content">
      {modal && <ItemModal item={modal==='add'?null:modal} onSave={saveItem} onClose={()=>setModal(null)} currentUser={currentUser} />}
      {showBulk && <BulkUploadModal onClose={()=>setShowBulk(false)} onSave={items=>setItems(p=>[...p,...items])} currentUser={currentUser} />}
      {detail && <ItemDetailModal item={detail} onClose={()=>setDetail(null)} onEdit={handleEdit} onDelete={handleDelete} />}

      {/* Toolbar */}
      <div className="toolbar">
        <button className={`cat-chip${filterCat==='All'?' active':''}`} onClick={()=>setFilterCat('All')}>All</button>
        {CATEGORIES.map(c => (
          <button key={c} className={`cat-chip${filterCat===c?' active':''}`} onClick={()=>setFilterCat(c)}>{c}</button>
        ))}
        <div className="toolbar-divider" />
        <input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" />
        <button className="add-multi-btn" onClick={()=>setShowBulk(true)}>+ Add multiple</button>
        <button className="add-btn" onClick={()=>setModal('add')}>+ Add</button>
      </div>

      {/* Grid — sectioned when All, flat when filtered or searching */}
      {filtered.length === 0
        ? <div className="empty-state">
            {items.length === 0
              ? <>No items yet.<br/><span style={{fontSize:12}}>Tap <strong>+ Add</strong> to start building your wardrobe.</span></>
              : <>No items match the filter.</>
            }
          </div>
        : grouped
          ? grouped.map(({ cat, items: catItems }) => (
              <div key={cat}>
                {/* Section divider — thin rule with category label */}
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '14px 14px 8px',
                }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.1em', whiteSpace: 'nowrap' }}>
                    {cat} <span style={{ fontWeight: 400, opacity: 0.7 }}>· {catItems.length}</span>
                  </span>
                  <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
                </div>
                <div className="photo-grid" style={{ paddingTop: 0 }}>
                  {catItems.map(item => <GridCard key={item.id} item={item} onClick={setDetail} />)}
                </div>
              </div>
            ))
          : <div className="photo-grid">
              {[...filtered].sort((a,b)=>colorRank(a.color)-colorRank(b.color)).map(item => <GridCard key={item.id} item={item} onClick={setDetail} />)}
            </div>
      }
    </div>
  );
}

/* ── Builder Tab — horizontal carousel ── */
function BuilderTab({ items, setOutfits, currentUser, tagGroups }) {
  const [selected, setSelected] = useState([]);
  const [occasions, setOccasions] = useState([]);
  const [outfitName, setOutfitName] = useState('');
  const [notes, setNotes] = useState('');
  const [saved, setSaved] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');
  const apiKey = localStorage.getItem(storageKey('apikey', currentUser))||'';

  const toggle = id => setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);
  const selectedItems = items.filter(i=>selected.includes(i.id));
  const canSave = selected.length >= 2 && occasions.length > 0;

  // Build category rows — only categories that have items
  const categoryRows = useMemo(() =>
    CATEGORIES
      .map(cat => ({ cat, catItems: items.filter(i => i.category === cat).sort((a,b)=>colorRank(a.color)-colorRank(b.color)) }))
      .filter(r => r.catItems.length > 0),
    [items]
  );

  const suggestOcc = async () => {
    if(!selectedItems.length||!apiKey) return;
    setAiLoading(true); setAiError('');
    try { const s = await suggestOutfitOccasions(selectedItems, apiKey, tagGroups); setOccasions(s); }
    catch(e) { setAiError('Could not suggest. Check API key in Settings.'); }
    setAiLoading(false);
  };

  const saveOutfit = () => {
    if(!canSave) return;
    const name = outfitName.trim() || occasions.join(' · ');
    setOutfits(p=>[...p,{ id:Date.now(), name, itemIds:selected, occasions, notes }]);
    setSelected([]); setOccasions([]); setOutfitName(''); setNotes('');
    setSaved(true); setTimeout(()=>setSaved(false), 2000);
  };

  if (items.length === 0) {
    return <div className="empty-state">Add items in Wardrobe first.</div>;
  }

  return (
    <div className="builder-carousel">
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <p style={{ fontSize:13, fontWeight:600, letterSpacing:'-0.01em' }}>Build an Outfit</p>
        {selected.length > 0 && (
          <p style={{ fontSize:11, color:'var(--text3)' }}>{selected.length} piece{selected.length!==1?'s':''} selected</p>
        )}
      </div>

      {/* Category carousel rows */}
      {categoryRows.map(({ cat, catItems }) => {
        const selCount = catItems.filter(i => selected.includes(i.id)).length;
        return (
          <div key={cat} className="carousel-section">
            <div className="carousel-row-label">
              {cat} {selCount > 0 && <span>· {selCount} selected</span>}
            </div>
            <div className="carousel-strip">
              {catItems.map(item => (
                <div
                  key={item.id}
                  className={`carousel-card${selected.includes(item.id) ? ' selected' : ''}`}
                  onClick={() => toggle(item.id)}
                  title={item.name}
                >
                  {item.photo
                    ? <img src={item.photo} alt={item.name} onError={e=>e.target.style.display='none'} />
                    : null
                  }
                  <div className="carousel-card-emoji" style={{ display: item.photo ? 'none' : 'flex' }}>
                    {CAT_EMOJI[item.category]||'👔'}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {/* Outfit form */}
      <div className="builder-form">
        {/* Selected chips summary */}
        {selectedItems.length > 0 && (
          <div className="builder-selected-chips">
            {selectedItems.map(item => (
              <div key={item.id} className="builder-chip">
                <div className="builder-chip-thumb">
                  {item.photo ? <img src={item.photo} alt="" /> : CAT_EMOJI[item.category]}
                </div>
                <span style={{ maxWidth:80, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.name}</span>
                <button style={{ border:'none', padding:'0 2px', fontSize:10, color:'var(--text3)', lineHeight:1 }} onClick={()=>toggle(item.id)}>✕</button>
              </div>
            ))}
          </div>
        )}

        <div className="form-row">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:7 }}>
            <label style={{ margin:0 }}>Occasion *</label>
            {apiKey && selectedItems.length > 0 && (
              <button className="btn-ai" style={{ padding:'3px 9px', fontSize:11 }} onClick={suggestOcc} disabled={aiLoading}>
                {aiLoading ? <><span className="spinner"/>…</> : '✨ AI suggest'}
              </button>
            )}
          </div>
          <OccasionPicker selected={occasions} onChange={setOccasions} tagGroups={tagGroups} />
          {aiError && <p style={{ fontSize:10, color:'#c00', marginTop:5 }}>{aiError}</p>}
          {!apiKey && <p style={{ fontSize:10, color:'var(--text3)', marginTop:5 }}>Add API key in Settings for AI suggestions.</p>}
        </div>
        <div className="form-row">
          <label>Notes</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="When to wear, tips…" style={{ resize:'vertical', minHeight:52 }} />
        </div>
        <button className="btn-primary" style={{ width:'100%', padding:'10px' }} onClick={saveOutfit} disabled={!canSave}>
          {saved ? '✓ Saved!' : `Save outfit (${selected.length} piece${selected.length!==1?'s':''})`}
        </button>
        {!canSave && <p style={{ fontSize:11, color:'var(--text3)', textAlign:'center', marginTop:6 }}>{selected.length<2?'Select at least 2 pieces':'Pick at least one occasion'}</p>}
      </div>
    </div>
  );
}

                {CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
              <p style={{ fontSize:11, color:'var(--text3)' }}>{selected.length} selected</p>
            </div>
            <div className="grid-3">{filtered.map(item=><GridCard key={item.id} item={item} selectable selected={selected.includes(item.id)} onSelect={()=>toggle(item.id)} />)}</div>
          </div>
          <div style={{ padding:'1rem 1.25rem', overflowY:'auto' }}>
            <p className="section-label">Selected</p>
            {selectedItems.length===0 ? <p style={{ fontSize:12, color:'var(--text3)', marginBottom:12 }}>None selected.</p>
              : <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:14 }}>
                  {selectedItems.map(item=>(
                    <div key={item.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 8px', background:'var(--bg2)', borderRadius:'var(--radius)', border:'1px solid var(--border)' }}>
                      <div style={{ width:30, height:38, borderRadius:'var(--radius)', overflow:'hidden', flexShrink:0, background:'var(--bg3)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15 }}>
                        {item.photo ? <img src={item.photo} style={{ width:'100%', height:'100%', objectFit:'cover' }} alt="" /> : CAT_EMOJI[item.category]}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <p style={{ fontSize:12, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.name}</p>
                        <p style={{ fontSize:10, color:'var(--text2)' }}>{item.color} · {item.category}</p>
                      </div>
                      <button style={{ padding:'2px 6px', fontSize:11, border:'none', color:'var(--text3)' }} onClick={()=>toggle(item.id)}>✕</button>
                    </div>
                  ))}
                </div>
            }
            <div style={{ borderTop:'1px solid var(--border)', paddingTop:12 }}>
              <div className="form-row">
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                  <label style={{ margin:0 }}>Occasion *</label>
                  {apiKey && selectedItems.length>0 && <button className="btn-ai" style={{ padding:'3px 9px', fontSize:11 }} onClick={suggestOcc} disabled={aiLoading}>{aiLoading?<><span className="spinner"/>…</>:'✨ AI'}</button>}
                </div>
                <OccasionPicker selected={occasions} onChange={setOccasions} tagGroups={tagGroups} />
                {aiError && <p style={{ fontSize:10, color:'#c00', marginTop:4 }}>{aiError}</p>}
              </div>
              <div className="form-row">
                <label>Notes</label>
                <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Tips…" style={{ resize:'vertical', minHeight:48 }} />
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn-primary" style={{ flex:1, padding:'9px' }} onClick={submit} disabled={!canSave}>Save changes</button>
                <button style={{ flex:1, padding:'9px' }} onClick={onClose}>Cancel</button>
              </div>
              {!canSave && <p style={{ fontSize:10, color:'var(--text3)', textAlign:'center', marginTop:5 }}>{selected.length<2?'Select ≥ 2 pieces':'Pick an occasion'}</p>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Outfits Tab ── */
function OutfitsTab({ outfits, setOutfits, items, setItems, currentUser, tagGroups }) {
  const [search, setSearch] = useState('');
  const [filterOcc, setFilterOcc] = useState('All');
  const [editingOutfit, setEditingOutfit] = useState(null);
  const saveEdit = updated => setOutfits(p=>p.map(o=>o.id===updated.id?updated:o));

  const logWear = (outfit) => {
    const now = new Date().toISOString();
    setOutfits(p => p.map(o => o.id===outfit.id ? { ...o, wornCount:(o.wornCount||0)+1, lastWorn:now } : o));
    setItems(p => p.map(i => outfit.itemIds.includes(i.id) ? { ...i, wornCount:(i.wornCount||0)+1, lastWorn:now } : i));
  };
  const usedOccasions = useMemo(() => {
    const all = outfits.flatMap(o=>o.occasions||[]);
    const allTags = (tagGroups||DEFAULT_TAG_GROUPS).flatMap(g=>g.tags);
    return ['All', ...allTags.filter(o=>all.includes(o))];
  }, [outfits, tagGroups]);
  const filtered = outfits.filter(o => {
    if(search && ![o.name||'',o.notes||'',...(o.occasions||[])].join(' ').toLowerCase().includes(search.toLowerCase())) return false;
    if(filterOcc!=='All' && !(o.occasions||[]).includes(filterOcc)) return false;
    return true;
  });
  return (
    <div className="content">
      {editingOutfit && <EditOutfitModal outfit={editingOutfit} items={items} onSave={saveEdit} onClose={()=>setEditingOutfit(null)} currentUser={currentUser} tagGroups={tagGroups} />}
      {/* Toolbar */}
      <div className="toolbar">
        {usedOccasions.map(occ=>(
          <button key={occ} className={`cat-chip${filterOcc===occ?' active':''}`} onClick={()=>setFilterOcc(occ)}>{occ}</button>
        ))}
        <div className="toolbar-divider" />
        <input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" />
        <span style={{ fontSize:11, color:'var(--text3)', whiteSpace:'nowrap', flexShrink:0 }}>{filtered.length} outfit{filtered.length!==1?'s':''}</span>
      </div>

      <div className="outfits-content">
        {filtered.length===0
          ? <div className="empty-state">No outfits yet.<br/><span style={{fontSize:12}}>Build one in the Outfit Builder tab.</span></div>
          : <div className="grid-2">
              {filtered.map(outfit => {
                const oi = items.filter(i=>outfit.itemIds.includes(i.id));
                const cats = [...new Set(oi.map(i=>i.category))];
                return (
                  <div key={outfit.id} className="outfit-card">
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginBottom:6 }}>
                          {(outfit.occasions||[]).map(occ=>(
                            <span key={occ} style={{ fontSize:12, fontWeight:600, padding:'3px 10px', borderRadius:20, background:'var(--text)', color:'var(--bg)' }}>{occ}</span>
                          ))}
                        </div>
                        <p style={{ fontSize:12, color:'var(--text2)' }}>{oi.length} pieces · {cats.join(', ')}</p>
                        {outfit.name && outfit.name!==(outfit.occasions||[]).join(' · ') && (
                          <p style={{ fontSize:11, color:'var(--text3)', marginTop:2 }}>{outfit.name}</p>
                        )}
                        {(outfit.wornCount > 0) && (
                          <p style={{ fontSize:10, color:'var(--text3)', marginTop:3 }}>Worn {outfit.wornCount}×{outfit.lastWorn ? ` · ${new Date(outfit.lastWorn).toLocaleDateString(undefined,{month:'short',day:'numeric'})}` : ''}</p>
                        )}
                      </div>
                      <div style={{ display:'flex', gap:5, flexShrink:0, marginLeft:8, alignItems:'center' }}>
                        <button title="Log as worn today" style={{ padding:'3px 10px', fontSize:13, fontWeight:600, background:'var(--bg2)', border:'1px solid var(--border2)', borderRadius:'var(--radius)' }} onClick={()=>logWear(outfit)}>+</button>
                        <button style={{ padding:'3px 9px', fontSize:11 }} onClick={()=>setEditingOutfit(outfit)}>Edit</button>
                        <button className="btn-danger" style={{ padding:'3px 9px', fontSize:11 }} onClick={()=>setOutfits(p=>p.filter(o=>o.id!==outfit.id))}>Delete</button>
                      </div>
                    </div>
                    <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:outfit.notes?8:0 }}>
                      {oi.map(item=>(
                        <div key={item.id} style={{ width:62, height:78, background:'var(--bg2)', borderRadius:'var(--radius)', border:'1px solid var(--border)', overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
                          {item.photo ? <img src={item.photo} style={{ width:'100%', height:'100%', objectFit:'cover' }} alt="" onError={e=>e.target.style.display='none'} /> : <span style={{ fontSize:24 }}>{CAT_EMOJI[item.category]||'👔'}</span>}
                        </div>
                      ))}
                    </div>
                    {outfit.notes && <p style={{ fontSize:11, color:'var(--text2)', paddingTop:8, borderTop:'1px solid var(--border)', fontStyle:'italic', lineHeight:1.6 }}>{outfit.notes}</p>}
                  </div>
                );
              })}
            </div>
        }
      </div>
    </div>
  );
}

/* ── Main App (mounted after login) ── */
function MainApp({ currentUser, onLogout }) {
  const [tab, setTab] = useState('wardrobe');
  const [items, setItems] = useState(()=>loadState(storageKey('items', currentUser), SAMPLE_ITEMS));
  const [outfits, setOutfits] = useState(()=>loadState(storageKey('outfits', currentUser), SAMPLE_OUTFITS));
  const [tagGroups, setTagGroups] = useState(()=>loadState(storageKey('taggroups', currentUser), DEFAULT_TAG_GROUPS));
  const [showSettings, setShowSettings] = useState(false);
  const [hasKey, setHasKey] = useState(()=>!!localStorage.getItem(storageKey('apikey', currentUser)));
  const [hasCloud, setHasCloud] = useState(()=>{ try { const c=JSON.parse(localStorage.getItem(storageKey('cloudinary', currentUser))||'{}'); return !!(c.cloudName&&c.uploadPreset); } catch { return false; } });

  useEffect(()=>{ try { localStorage.setItem(storageKey('items', currentUser), JSON.stringify(items)); } catch {} }, [items]);
  useEffect(()=>{ try { localStorage.setItem(storageKey('outfits', currentUser), JSON.stringify(outfits)); } catch {} }, [outfits]);
  useEffect(()=>{ try { localStorage.setItem(storageKey('taggroups', currentUser), JSON.stringify(tagGroups)); } catch {} }, [tagGroups]);

  const onSettingsClose = () => {
    setShowSettings(false);
    setHasKey(!!localStorage.getItem(storageKey('apikey', currentUser)));
    try { const c=JSON.parse(localStorage.getItem(storageKey('cloudinary', currentUser))||'{}'); setHasCloud(!!(c.cloudName&&c.uploadPreset)); } catch {}
  };

  const TABS = [
    { id:'wardrobe', label:'Wardrobe' },
    { id:'builder',  label:'Builder' },
    { id:'outfits',  label:'Outfits' },
  ];

  return (
    <div style={{ background:'var(--bg)', minHeight:'100vh', borderLeft:'1px solid var(--border)', borderRight:'1px solid var(--border)' }}>
      {showSettings && <SettingsModal onClose={onSettingsClose} currentUser={currentUser} tagGroups={tagGroups} setTagGroups={setTagGroups} />}

      {/* Top nav */}
      <div className="top-nav">
        <div className="nav-tabs">
          {TABS.map(t => (
            <button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:11, color:'var(--text3)', letterSpacing:'0.02em' }}>{currentUser}</span>
          <button className="settings-btn" onClick={()=>setShowSettings(true)}>
            ⚙
            {hasCloud && <span className="settings-badge" style={{ color:'#39a855' }}>CDN</span>}
            {hasKey   && <span className="settings-badge" style={{ color:'var(--accent)' }}>AI</span>}
          </button>
          <button style={{ padding:'4px 10px', fontSize:11, color:'var(--text3)', border:'1px solid var(--border2)', borderRadius:'var(--radius)' }} onClick={onLogout}>Sign out</button>
        </div>
      </div>

      {/* Banners (only if nothing set up) */}
      {(!hasCloud || !hasKey) && (
        <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
          {!hasCloud && (
            <div style={{ padding:'9px 1.25rem', background:'#fffaed', fontSize:11, color:'#7a5200', borderBottom:'1px solid #f0d97a', cursor:'pointer', lineHeight:1.6 }} onClick={()=>setShowSettings(true)}>
              ☁ <strong>Connect Cloudinary</strong> for photo storage across devices.
            </div>
          )}
          {!hasKey && (
            <div style={{ padding:'9px 1.25rem', background:'var(--accent-bg)', fontSize:11, color:'var(--accent)', borderBottom:'1px solid rgba(80,96,240,0.25)', cursor:'pointer', lineHeight:1.6 }} onClick={()=>setShowSettings(true)}>
              ✨ <strong>Enable AI auto-fill</strong> — add your Anthropic API key in Settings.
            </div>
          )}
        </div>
      )}

      {/* Tab content */}
      {tab==='wardrobe' && <WardrobeTab items={items} setItems={setItems} currentUser={currentUser} />}
      {tab==='builder'  && <BuilderTab  items={items} setOutfits={setOutfits} currentUser={currentUser} tagGroups={tagGroups} />}
      {tab==='outfits'  && <OutfitsTab  outfits={outfits} setOutfits={setOutfits} items={items} setItems={setItems} currentUser={currentUser} tagGroups={tagGroups} />}
    </div>
  );
}

/* ── App Shell ── */
function App() {
  const [currentUser, setCurrentUser] = useState(() => sessionStorage.getItem(SK_CURRENT_USER));

  const handleLogout = () => {
    sessionStorage.removeItem(SK_CURRENT_USER);
    setCurrentUser(null);
  };

  if (!currentUser) {
    return <LoginScreen onLogin={u => setCurrentUser(u)} />;
  }

  return <MainApp key={currentUser} currentUser={currentUser} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
